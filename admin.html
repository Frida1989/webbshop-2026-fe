<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard | Eventera</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="admin.css" />
    <script src="./src/scripts/header.js" defer></script>
  </head>
  <body>
    <header class="site-header">
      <nav class="container nav">
        <a href="index.html" class="logo">Eventera</a>
        <ul class="nav-links">
          <li><a href="index.html">Home</a></li>
          <li><a href="about.html">About us</a></li>
          <li><a href="contact.html">Contact</a></li>
          <!-- <li><a href="register.html">Register</a></li>
          <li><a href="login.html" class="nav-login">Log In</a></li> -->
        </ul>

        <div class="user-area" id="userArea" style="display: none">
          <div class="user-profile" id="userProfile">
            <div class="user-avatar" id="userInitial">U</div>
            <span id="userName">User</span>
          </div>
          <button class="logout-btn" id="logoutBtn">Logout</button>
        </div>
      </nav>
    </header>

    <main class="admin-main">
      <h1>Admin – Manage Products</h1>

      <form id="createProductForm" class="admin-form">
        <div class="admin-form-row">
          <label for="name">Name</label>
          <input type="text" id="name" required />
        </div>
        <div class="admin-form-row">
          <label for="price">Price</label>
          <input type="number" id="price" step="0.01" min="0" required />
        </div>
        <div class="admin-form-row">
          <label for="spots">Spots</label>
          <input type="number" id="spots" min="0" required />
        </div>
        <div class="admin-form-row">
          <label for="image">Image URL</label>
          <input type="url" id="image" required />
        </div>
        <div class="admin-form-row">
          <label for="slug">Slug</label>
          <input type="text" id="slug" required placeholder="e.g. organic-tomatoes" />
        </div>
        <button type="submit">Create Product</button>
      </form>

      <h2>Products</h2>
      <div class="admin-table-wrap">
        <div class="admin-filters">
          <button id="filterAll" class="active">All</button>
          <button id="filterUpcoming">Upcoming</button>
          <button id="filterSoldOut">Sold Out</button>
        </div>
        <button onclick="window.print()" class="print-btn">Print</button>
        <table class="admin-table">
          <thead>
            <tr>
              <th>Title</th>
              <th>Date</th>
              <th>Location</th>
              <th>Price</th>
              <th>Bookings</th>
              <th>Spots Left</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="productsTableBody">
            <tr id="loadingRow">
              <td colspan="7" class="loading-cell">Loading products...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </main>

    <script type="module" src="./src/scripts/admin.js"></script>
  </body>
</html>
