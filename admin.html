<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard | Eventera</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="admin.css" />
    <script src="./src/scripts/header.js" defer></script>
  </head>
  <body>
    <header class="site-header">
      <nav class="container nav">
        <a href="index.html" class="logo">Eventera</a>
        <ul class="nav-links">
          <li><a href="index.html">Home</a></li>
          <li><a href="about.html">About us</a></li>
          <li><a href="contact.html">Contact</a></li>
        </ul>

        <div class="user-area" id="userArea" style="display: none">
          <div class="user-profile" id="userProfile">
            <div class="user-avatar" id="userInitial">U</div>
            <span id="userName">User</span>
          </div>
          <button class="logout-btn" id="logoutBtn">Logout</button>
        </div>
      </nav>
    </header>

    <main class="admin-main">
      <h1>Admin – Manage Events</h1>

      <form id="createProductForm" class="admin-form">

        <div class="admin-form-row">
          <label for="name">Event Title</label>
          <input type="text" id="name" required />
        </div>

        <div class="admin-form-row">
          <label for="description">Description</label>
          <input type="text" id="description" required />
        </div>

        <div class="admin-form-row">
          <label for="price">Price</label>
          <input type="number" id="price" step="0.01" min="0" required />
        </div>

        <div class="admin-form-row">
          <label for="spots">Max Spots</label>
          <input type="number" id="spots" min="1" required />
        </div>

        <div class="admin-form-row">
          <label for="image">Image URL</label>
          <input type="url" id="image" required />
        </div>

        <div class="admin-form-row">
          <label for="location">City</label>
          <select id="location" required>
            <option value="">Select city</option>
            <option value="Stockholm">Stockholm</option>
            <option value="Göteborg">Göteborg</option>
            <option value="Malmö">Malmö</option>
            <option value="Uppsala">Uppsala</option>
          </select>
        </div>

        <div class="admin-form-row">
          <label for="date">Event Date</label>
          <input type="date" id="date" required />
        </div>

        <div class="admin-form-row">
          <label for="category">Category</label>
          <select id="category" required>
            <option value="Music">Music</option>
            <option value="Art & culture">Art & culture</option>
            <option value="Health">Health</option>
            <option value="Sport">Sport</option>
            <option value="Dance">Dance</option>
            <option value="Social activities">Social activities</option>
          </select>
        </div>

        <button type="submit">Create Event</button>
      </form>

      <h2>Events</h2>
      <div class="admin-table-wrap">
        <button onclick="window.print()" class="print-btn">Print</button>
        <table class="admin-table">
          <thead>
            <tr>
              <th>Title</th>
              <th>Date</th>
              <th>Location</th>
              <th>Price</th>
              <th>Spots Left</th>
            </tr>
          </thead>
          <tbody id="productsTableBody">
            <tr>
              <td colspan="7">Loading...</td>
            </tr>
          </tbody>
        </table>
      </div>
      <h2>Bookings</h2>
        <div class="admin-table-wrap">
          <table class="admin-table">
            <thead>
              <tr>
                <th>User</th>
                <th>Event</th>
                <th>Date</th>
                <th>Spots</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="bookingsTableBody">
              <tr>
                <td colspan="5">Loading...</td>
              </tr>
            </tbody>
          </table>
        </div>
    </main>

    <script type="module" src="./src/scripts/admin.js"></script>
  </body>
</html>
