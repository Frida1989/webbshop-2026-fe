<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Eventera</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- HEADER -->
    <header class="site-header">
      <!-- lagt till .container och .nav klass -->
      <nav class="container nav">
        <a href="index.html" class="logo">Eventera</a>
        <ul class="nav-links">
          <!-- <li><a href="products.html">Events</a></li> -->
          <li><a href="about.html">About us</a></li>
          <li><a href="register.html">Register</a></li>
          <li><a href="login.html" class="nav-login">Log In</a></li>
          <!-- <li><a href="admin.html">Admin</a></li>  SYNLIGT ENDAST NÄR INLOGGAD SOM ADMIN -->
        </ul>
      </nav>
    </header>

    <!-- HERO (full width) -->
    <section class="hero">
      <!-- wrapper för bättre layout -->
      <div class="container hero__content">
        <!--  headline -->
        <h1>Find your vibe.<br />Book your next event.</h1>

        <!--  beskrivning -->
        <p>
          Explore dance, music, wellness and cultural events near you, all in
          one elegant booking experience.
        </p>

        <!--   NY: search-card istället för lösa inputs -->
        <form class="hero-search-card" aria-label="Search events">
          <!--  Location -->
          <div class="form-group">
            <label class="label" for="location">Location</label>
            <select id="location" name="location">
              <option value="" selected>All cities</option>
              <option value="Stockholm">Stockholm</option>
              <option value="Malmö">Malmö</option>
              <option value="Göteborg">Göteborg</option>
              <option value="Uppsala">Uppsala</option>
            </select>
          </div>

          <!--  Date -->
          <div class="form-group">
            <label class="label" for="datepicker">Date</label>
            <input type="date" id="datepicker" name="datepicker" />
          </div>

          <!--  Category (fixat ID + bättre text) -->
          <div class="form-group">
            <label class="label" for="category">Category</label>
            <select id="category" name="category">
              <option value="" selected>All categories</option>
              <option value="music">Music</option>
              <option value="art">Art & culture</option>
              <option value="health">Health & wellbeing</option>
              <option value="sport">Sport & coaching</option>
              <option value="dance">Dance</option>
              <option value="travel">Travel & outdoors</option>
              <option value="social">Social activities</option>
            </select>
          </div>

          <!--  Type (fixat duplicate id!) -->
          <div class="form-group">
            <label class="label" for="type">Type</label>
            <select id="type" name="type">
              <option value="" selected>All types</option>
              <option value="online">Online</option>
              <option value="person">In person</option>
            </select>
          </div>

          <!--  förbättrad CTA -->
          <button
            id="searchBtn"
            type="submit"
            class="btn btn-primary hero-search-btn"
          >
            Search events
          </button>
        </form>
      </div>
    </section>

    <!-- MAIN CONTENT -->
    <main class="main-content">
      <h1>Featured Events</h1>
      <div id="products"></div>
    </main>

    <!-- FOOTER -->
    <footer class="site-footer">
      <div class="footer-content">
        <p>&copy; 2026 Eventera. All rights reserved.</p>
        <div class="footer-links">
          <a href="/about">About</a>
          <a href="/contact">Contact</a>
          <a href="/terms">Terms</a>
        </div>
      </div>
    </footer>

    <!-- PAGE-SPECIFIC JAVASCRIPT -->
    <script type="module" src="./src/scripts/index.js"></script>
  </body>
</html>
