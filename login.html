<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Eventera</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="./src/scripts/header.js" defer></script>
    <script type="module" src="./src/scripts/index.js" defer></script>
</head>
<body>

    <header class="site-header">
      <nav class="container nav">
        <a href="index.html" class="logo">Eventera</a>
        <ul class="nav-links">
          <!-- <li><a href="index.html">Home</a></li> -->
          <li><a href="about.html">About us</a></li>
          <li><a href="contact.html">Contact</a></li>
          <!-- <li><a href="register.html">Register</a></li>
          <li><a href="login.html" class="nav-login">Log In</a></li> -->
        </ul>

        <!-- User Area -->
        <div class="user-area" id="userArea" style="display: none">
          <div class="user-profile" id="userProfile">
            <div class="user-avatar" id="userInitial">U</div>
            <span id="userName">User</span>
          </div>
          <button class="logout-btn" id="logoutBtn">Logout</button>
        </div>
      </nav>
    </header>
    
    <section class="login-hero">
      <div class="register-card">
        <h1>Eventera</h1>
        <p>Login as admin</p>

        <form id="loginForm" class="login-form">
          <div>
            <span class="form-label">Email Address</span>
            <input type="email" id="email" placeholder="you@example.com" required />
          </div>
          
          <div>
            <span class="form-label">Password</span>
            <input type="password" id="password" placeholder="Enter your password" required />
          </div>

          <button type="submit" class="btn btn-primary" id="submitBtn">
            Log In
          </button>
        </form>
      </div>
    </section>

    <!-- FOOTER -->
    <footer class="site-footer">
      <div class="footer-content">
        <div class="footer-brand">
          <a href="index.html" class="footer-logo">Eventera</a>
          <p class="footer-text">
            Discover curated experiences, book unforgettable moments, and find the events that match your vibe.
          </p>
        </div>
        
        <div class="footer-links">
          <a href="about.html">About</a>
          <a href="#">Events</a>
          <a href="#">Contact</a>
          <a href="#">Terms</a>
        </div>

        <div class="footer-bottom">
          <p>&copy; 2026 Eventera. All rights reserved.</p>
        </div>
      </div>
    </footer>
</body>
</html>
